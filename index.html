<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retirement Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Retirement Calculator</h1>
      <p class="subtitle">Estimate how much you could have by retirement based on your savings habits.</p>

      <form id="calculator-form" class="card">
        <label>
          Current age
          <input type="number" id="currentAge" min="0" max="100" value="30" required />
        </label>

        <label>
          Retirement age
          <input type="number" id="retirementAge" min="1" max="100" value="65" required />
        </label>

        <label>
          Current savings ($)
          <input type="number" id="currentSavings" min="0" step="100" value="15000" required />
        </label>

        <label>
          Monthly contribution ($)
          <input type="number" id="monthlyContribution" min="0" step="50" value="500" required />
        </label>

        <label>
          Expected annual return (%)
          <input type="number" id="annualReturn" min="0" max="20" step="0.1" value="7" required />
        </label>

        <button type="submit">Calculate</button>
      </form>

      <section id="result" class="card result" aria-live="polite">
        <h2>Projection</h2>
        <p>Fill in your information and click Calculate.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
